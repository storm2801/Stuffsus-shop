<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>E-commerce</title>
</head>
<body>
    <header class="header">
        <nav class="header__navbar">
            <h1 class="header__title">Stuffsus</h1>
            <ul class="header__list-container">
                <li class="header__list-item"><a href="#">Home</a></li>
                <li class="header__list-item"><a href="#">Shop</a></li>
                <li class="header__list-item"><a href="#">Blog</a></li>
            </ul>
            <div class="header__tools">
                <a href="#"><img src="img/search.svg" class="header__img"></a>
                <a href="#"><img src="img/carshoping.svg" class="header__img"></a>
                <a href="#"><img src="img/user.svg" class="header__img"></a>
            </div>
        </nav>
        <h2 class="header__background-txt">Shop</h2>
        <div class="header__navbar-second">
            <h2 class="header__title-second">Give All You Need</h2>
            <div class="header__search">
                <input class="header__search-txt" type="text" placeholder="Search on Stuffsus">
                <button class="header__search-button">Search</button>
            </div>
        </div>
    </header>
    <main class="shop">
        <div class="shop__box">
            <div class="shop__category">
                <div class="shop__category-title-box">
                    <img src="img/category.svg" class="shop__category-title-img">
                    <h2 class="shop__category-title">Category</h2>
                </div>
                <div class="shop__category-container">
                    <ul class="shop__category-list">
                        <li class="shop__category-item"><img src="img/house.svg" class="shop__category-item-img"><a href="">For Home</a></li>
                        <li class="shop__category-item"><a href="">For Music</a></li>
                        <li class="shop__category-item"><a href="">For Phone</a></li>
                        <li class="shop__category-item"><a href="">For Segurity</a></li>
                    </ul>
                </div>
            </div>
            <div class="shop__product-container">
                <div class="shop__product-item">1</div>
                <div class="shop__product-item">2</div>
                <div class="shop__product-item">3</div>
                <div class="shop__product-item">4</div>
                <div class="shop__product-item">5</div>
                <div class="shop__product-item">6</div>
                <div class="shop__product-item">7</div>
                <div class="shop__product-item">8</div>
                <div class="shop__product-item">9</div>
                <div class="shop__product-item">10</div>
                <div class="shop__product-item">11</div>
                <div class="shop__product-item">12</div>
            </div>
        </div>
    </main>
</body>
</html>
